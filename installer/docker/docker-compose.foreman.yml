# Foreman docker-compose overlay.
#
# Use alongside the upstream nanobot Dockerfile; this file adds the volumes
# and env wiring Foreman needs (workspace, policies, env file).
#
# Generated by `foreman install --target docker`. The wizard rewrites the
{% raw %}# {{ ... }} placeholders.{% endraw %}
#
# Usage:
#   docker compose -f docker-compose.yml -f installer/docker/docker-compose.foreman.yml up -d

services:
  foreman:
    container_name: foreman
    image: foreman:{{ image_tag | default('latest') }}
    build:
      context: ../..
      dockerfile: Dockerfile
    user: "1000:1000"
    restart: unless-stopped
    env_file:
      - {{ env_file_path }}
    environment:
      FOREMAN_POLICY_TARGET: "{{ policy_target }}"
    volumes:
      # Persistent workspace (history.jsonl, MEMORY.md, personality store)
      - {{ workspace_dir }}:/home/foreman/.foreman/workspace
      # Active policy file mounted read-only
      - {{ policy_file_path }}:/app/policies/{{ policy_target }}.yaml:ro
    ports:
      # WebUI / gateway
      - "{{ gateway_port | default(18790) }}:18790"
    command: ["gateway"]
